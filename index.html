<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Scroll Scrub PoC</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        nav h1 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #video-container {
            height: 400vh;
            position: relative;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        video.active {
            z-index: 2;
        }

        #controls {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 100;
        }

        button {
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
        }

        .info {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 25px;
            border-radius: 30px;
            z-index: 100;
            font-size: 0.9rem;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 100;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <nav><h1>Scrub PoC</h1></nav>

    <div id="video-container">
        <video id="v1" class="active" preload="auto" muted playsinline>
            <source src="dark-rotoscoping-final.mp4" type="video/mp4">
        </video>
        <video id="v2" preload="auto" muted playsinline>
            <source src="f6a67db576e54346b3dc3ecdd17852b6-final.mp4" type="video/mp4">
        </video>
    </div>

    <div id="controls">
        <button id="swapBtn">Change Roof</button>
    </div>

    <div class="info">Scroll down to scrub</div>
    <footer>&copy; 2026 Video Scrub PoC</footer>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const container = document.getElementById('video-container');
        const swapBtn = document.getElementById('swapBtn');
        
        let activeVideo = v1;

        async function warmUp() {
            try {
                await v1.play(); v1.pause();
                await v2.play(); v2.pause();
            } catch(e) {}
        }

        swapBtn.addEventListener('click', () => {
            if (activeVideo === v1) {
                v1.classList.remove('active');
                v2.classList.add('active');
                activeVideo = v2;
            } else {
                v2.classList.remove('active');
                v1.classList.add('active');
                activeVideo = v1;
            }
        });

        function scrub() {
            const rect = container.getBoundingClientRect();
            const totalScrollable = rect.height - window.innerHeight;
            const scrollPercent = Math.max(0, Math.min(1, -rect.top / totalScrollable));
            
            if (v1.duration) v1.currentTime = v1.duration * scrollPercent;
            if (v2.duration) v2.currentTime = v2.duration * scrollPercent;
            
            requestAnimationFrame(scrub);
        }

        window.addEventListener('scroll', warmUp, {once: true, passive: true});
        window.addEventListener('click', warmUp, {once: true, passive: true});
        requestAnimationFrame(scrub);
    </script>
</body>
</html>
