<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Scroll Scrub PoC</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch; /* Better mobile scroll */
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 {
            margin: 0;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #video-container {
            height: 400vh;
            position: relative;
        }

        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            /* Critical for mobile playback */
            pointer-events: none; 
        }

        video.active {
            z-index: 2;
        }

        #controls {
            position: fixed;
            top: 70px;
            right: 20px;
            z-index: 100;
        }

        button {
            padding: 10px 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .info {
            position: fixed;
            bottom: 60px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 100;
            font-size: 0.8rem;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            text-align: center;
            font-size: 0.7rem;
            color: #888;
        }
    </style>
</head>
<body>

    <nav><h1>Scrub PoC</h1></nav>

    <div id="video-container">
        <!-- src is injected by JS to use local Blobs -->
        <video id="v1" class="active" preload="auto" muted playsinline webkit-playsinline></video>
        <video id="v2" preload="auto" muted playsinline webkit-playsinline></video>
    </div>

    <div id="controls">
        <button id="swapBtn">Change Roof</button>
    </div>

    <div class="info">Loading videos...</div>
    <footer>&copy; 2026 Video Scrub PoC</footer>

    <script>
        const v1 = document.getElementById('v1');
        const v2 = document.getElementById('v2');
        const container = document.getElementById('video-container');
        const swapBtn = document.getElementById('swapBtn');
        const info = document.querySelector('.info');
        
        let activeVideo = v1;
        let isLoaded = false;
        let isWarmedUp = false;

        // FETCH VIDEOS AS BLOBS
        // This is the "magic bullet" for mobile scrubbing. 
        // iOS Safari chokes on HTTP Range Requests when scrubbing rapidly. 
        // Loading it fully into memory bypasses the network entirely.
        async function preloadVideos() {
            try {
                const [req1, req2] = await Promise.all([
                    fetch('dark-rotoscoping-final.mp4'),
                    fetch('f6a67db576e54346b3dc3ecdd17852b6-final.mp4')
                ]);
                
                const blob1 = await req1.blob();
                const blob2 = await req2.blob();
                
                v1.src = URL.createObjectURL(blob1);
                v2.src = URL.createObjectURL(blob2);
                
                isLoaded = true;
                info.innerText = "Ready! Scroll down to scrub.";
            } catch(e) {
                info.innerText = "Error loading videos.";
                console.error(e);
            }
        }

        function warmUp() {
            if (!isLoaded || isWarmedUp) return;
            isWarmedUp = true;
            // Native promises handle the play request, unlocking mobile playback
            v1.play().then(() => v1.pause()).catch(() => { isWarmedUp = false; });
            v2.play().then(() => v2.pause()).catch(() => { isWarmedUp = false; });
        }

        swapBtn.addEventListener('click', () => {
            warmUp();
            if (activeVideo === v1) {
                v1.classList.remove('active');
                v2.classList.add('active');
                activeVideo = v2;
            } else {
                v2.classList.remove('active');
                v1.classList.add('active');
                activeVideo = v1;
            }
        });

        function scrub() {
            if (!isLoaded) return;
            const scrollY = window.pageYOffset || document.documentElement.scrollTop;
            const totalScrollable = container.offsetHeight - window.innerHeight;
            const scrollPercent = Math.max(0, Math.min(1, scrollY / totalScrollable));

            if (v1.duration) v1.currentTime = v1.duration * scrollPercent;
            if (v2.duration) v2.currentTime = v2.duration * scrollPercent;
        }

        // Start loading the blobs immediately
        preloadVideos();

        // Bind warmup to initial user touch
        ['touchstart', 'mousedown'].forEach(event => {
            window.addEventListener(event, warmUp, {once: true, passive: true});
        });

        window.addEventListener('scroll', scrub, {passive: true});
    </script>
</body>
</html>
